<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Satz der Woche – Deutsch</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --rot: #E57373;
  --dunkelrot: #B71C1C;
  --gruen: #06D6A0;
  --dunkelgruen: #028A5B;
  --weiss: #FFFFFF;
  --text: #3A1A1A;
  --grau: #BB8888;
  --schatten: rgba(181,60,60,.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Quicksand', sans-serif;
  color: var(--text); min-height: 100vh; padding-bottom: 60px;
  background: linear-gradient(180deg, #FFE4E4 0%, #FFCDD2 60%, #FFAAA0 100%);
}
a.zurueck {
  display: inline-flex; align-items: center; gap: 8px; margin: 20px 24px;
  font-family: 'Baloo 2', cursive; font-size: .9rem; font-weight: 700;
  color: var(--dunkelrot); background: rgba(255,255,255,.65);
  border-radius: 50px; padding: 8px 20px; text-decoration: none;
  box-shadow: 0 2px 10px rgba(181,60,60,.15); transition: background .2s, transform .2s;
}
a.zurueck:hover { background: rgba(255,255,255,.9); transform: translateX(-3px); }
header { text-align: center; padding: 8px 20px 22px; }
.fach-badge {
  display: inline-block; background: rgba(255,255,255,.7); color: var(--dunkelrot);
  border-radius: 40px; padding: 5px 18px; font-size: .78rem; font-weight: 700;
  letter-spacing: .6px; text-transform: uppercase; margin-bottom: 12px;
  box-shadow: 0 4px 12px rgba(181,60,60,.2);
}
header h1 {
  font-family: 'Baloo 2', cursive; font-size: clamp(1.8rem, 5vw, 2.8rem);
  font-weight: 800; color: var(--dunkelrot); margin-bottom: 4px;
}
header p { font-size: .9rem; color: var(--grau); font-weight: 600; }
.karte {
  background: var(--weiss); border-radius: 22px; padding: 22px 24px;
  max-width: 720px; margin: 0 auto 16px;
  box-shadow: 0 8px 32px var(--schatten); border: 2px solid rgba(229,115,115,.1);
}
.punkte-leiste {
  display: flex; gap: 12px; flex-wrap: wrap;
  background: rgba(229,115,115,.08); border-radius: 14px;
  padding: 10px 16px; margin-bottom: 18px; border: 1.5px solid rgba(229,115,115,.2);
}
.punkte-block { text-align: center; flex: 1; }
.punkte-label { font-size: .72rem; font-weight: 700; color: var(--grau); text-transform: uppercase; }
.punkte-zahl { font-family: 'Baloo 2', cursive; font-size: 1.2rem; font-weight: 800; color: var(--dunkelrot); }
.punkte-zahl.gruen { color: var(--dunkelgruen); }
.quelle-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
.quelle-tab {
  flex: 1; padding: 10px; border-radius: 12px; text-align: center;
  border: 2px solid rgba(229,115,115,.2); background: #FFF8F8;
  color: var(--grau); font-family: 'Baloo 2', cursive; font-size: .9rem; font-weight: 700;
  cursor: pointer; transition: all .2s;
}
.quelle-tab.aktiv {
  background: linear-gradient(135deg, var(--rot), var(--dunkelrot));
  color: #fff; border-color: transparent; box-shadow: 0 4px 14px rgba(229,115,115,.3);
}
.panel { display: none; }
.panel.sichtbar { display: block; }
.feld-label {
  display: block; font-size: .8rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .6px; color: var(--grau); margin-bottom: 8px;
}
.eingabe-zeile { display: flex; gap: 10px; }
.satz-eingabe {
  flex: 1; padding: 12px 15px; border-radius: 14px;
  border: 2px solid rgba(229,115,115,.25);
  font-family: 'Quicksand', sans-serif; font-size: 1rem; font-weight: 600;
  color: var(--text); outline: none; background: #FFF8F8; transition: border-color .2s;
}
.satz-eingabe:focus { border-color: var(--rot); }
.btn-rot {
  padding: 12px 22px; border-radius: 14px; border: none;
  background: linear-gradient(135deg, var(--rot), var(--dunkelrot)); color: #fff;
  font-family: 'Baloo 2', cursive; font-size: .9rem; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 14px rgba(229,115,115,.35);
  transition: filter .2s, transform .15s; white-space: nowrap;
}
.btn-rot:hover { filter: brightness(1.08); transform: scale(1.03); }
.btn-rahmen {
  padding: 10px 18px; border-radius: 14px;
  border: 2px solid rgba(229,115,115,.3); background: transparent;
  color: var(--dunkelrot); font-family: 'Baloo 2', cursive; font-size: .88rem; font-weight: 700;
  cursor: pointer; transition: all .2s;
}
.btn-rahmen:hover { background: rgba(229,115,115,.08); border-color: var(--rot); }
.hinweis-box {
  display: none; margin-top: 10px; border-radius: 12px; padding: 10px 14px;
  background: rgba(255,180,0,.1); border: 2px solid rgba(255,180,0,.3);
  font-size: .82rem; font-weight: 600; color: #7A5000; line-height: 1.7;
}
.hinweis-box ul { padding-left: 16px; margin-top: 4px; }
.zufall-anzeige {
  background: rgba(229,115,115,.07); border: 2px solid rgba(229,115,115,.2);
  border-radius: 14px; padding: 14px 18px; margin-bottom: 12px;
  font-size: 1.05rem; font-weight: 700; color: var(--dunkelrot); min-height: 52px;
}
.aktueller-satz {
  display: none; background: rgba(229,115,115,.08);
  border: 2px solid rgba(229,115,115,.2); border-radius: 14px;
  padding: 12px 18px; margin-top: 10px;
  font-size: .95rem; font-weight: 700; color: var(--dunkelrot);
}
.uebung-bereich { display: none; margin-top: 20px; }
.abschnitt-titel {
  font-family: 'Baloo 2', cursive; font-size: 1rem; font-weight: 800;
  color: var(--text); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.abschnitt-titel::after { content: ''; flex: 1; height: 2px; background: rgba(229,115,115,.2); border-radius: 2px; }
.kat-leiste { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.kat-btn {
  padding: 6px 14px; border-radius: 50px;
  border: 2px solid rgba(229,115,115,.2); background: #FFF8F8;
  color: var(--grau); font-family: 'Baloo 2', cursive; font-size: .8rem; font-weight: 700;
  cursor: pointer; transition: all .2s;
}
.kat-btn.aktiv { background: rgba(229,115,115,.12); border-color: var(--rot); color: var(--dunkelrot); }
.uebung-raster { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr)); gap: 10px; }
.uebung-btn {
  padding: 11px 12px; border-radius: 14px; border: 2px solid rgba(229,115,115,.2);
  background: #FFF8F8; color: var(--text);
  font-family: 'Quicksand', sans-serif; font-size: .83rem; font-weight: 700;
  cursor: pointer; transition: all .2s; text-align: left;
  display: flex; align-items: flex-start; gap: 9px;
}
.uebung-btn:hover { border-color: var(--rot); background: rgba(229,115,115,.07); transform: translateY(-2px); }
.uebung-btn.aktiv {
  background: linear-gradient(135deg, var(--rot), var(--dunkelrot));
  color: #fff; border-color: transparent; box-shadow: 0 4px 14px rgba(229,115,115,.3);
}
.uebung-btn.versteckt { display: none; }
.ue-icon { font-size: 1.2rem; flex-shrink: 0; margin-top: 1px; }
.ue-name { font-weight: 800; font-size: .83rem; display: block; }
.ue-info { font-size: .71rem; opacity: .7; margin-top: 1px; display: block; }
#aufgabe-karte { display: none; }
.aufgabe-innen {
  background: rgba(229,115,115,.05); border: 2px solid rgba(229,115,115,.18);
  border-radius: 20px; padding: 20px;
}
.aufgabe-typname { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .7px; color: var(--grau); margin-bottom: 8px; }
.aufgabe-text { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.65; margin-bottom: 14px; }
.aufgabe-text strong { color: var(--dunkelrot); }
.satz-hervorhebung {
  display: block; background: rgba(229,115,115,.08);
  border-left: 3px solid var(--rot); border-radius: 0 8px 8px 0;
  padding: 7px 12px; margin: 6px 0 10px; font-style: italic; font-weight: 700; color: var(--dunkelrot);
}
.tipp-box {
  display: none; background: rgba(255,217,61,.1); border: 2px solid rgba(255,217,61,.35);
  border-radius: 12px; padding: 9px 13px; margin-bottom: 12px;
  font-size: .81rem; font-weight: 600; color: #6B4700; line-height: 1.5;
}
.mc-optionen { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.mc-btn {
  padding: 11px 15px; border-radius: 12px; border: 2px solid rgba(229,115,115,.2);
  background: #fff; color: var(--text);
  font-family: 'Quicksand', sans-serif; font-size: .9rem; font-weight: 700;
  cursor: pointer; transition: all .2s; text-align: left;
}
.mc-btn:hover:not(:disabled) { border-color: var(--rot); background: rgba(229,115,115,.06); }
.mc-btn.richtig { background: rgba(6,214,160,.12); border-color: #06D6A0; color: #028A5B; }
.mc-btn.falsch  { background: rgba(255,107,107,.1); border-color: #FF6B6B; color: #C0392B; }
.mc-btn:disabled { cursor: default; }
.antwort-feld {
  width: 100%; padding: 12px 15px; border-radius: 14px;
  border: 2px solid rgba(229,115,115,.25);
  font-family: 'Quicksand', sans-serif; font-size: 1rem; font-weight: 600;
  color: var(--text); outline: none; background: #fff; margin-bottom: 12px;
  transition: border-color .2s;
}
.antwort-feld:focus { border-color: var(--rot); }
textarea.antwort-feld { resize: vertical; min-height: 80px; }
.btn-zeile { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
.pruefen-btn {
  padding: 11px 24px; border-radius: 50px; border: none;
  background: linear-gradient(135deg, var(--rot), var(--dunkelrot)); color: #fff;
  font-family: 'Baloo 2', cursive; font-size: .95rem; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 14px rgba(229,115,115,.35); transition: filter .2s, transform .15s;
}
.pruefen-btn:hover { filter: brightness(1.08); transform: scale(1.03); }
.weiter-btn {
  display: none; padding: 11px 24px; border-radius: 50px; border: none;
  background: linear-gradient(135deg, var(--gruen), var(--dunkelgruen)); color: #fff;
  font-family: 'Baloo 2', cursive; font-size: .95rem; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 14px rgba(6,214,160,.3); transition: filter .2s, transform .15s;
}
.weiter-btn:hover { filter: brightness(1.08); transform: scale(1.03); }
.rueckmeldung {
  display: none; border-radius: 14px; padding: 13px 16px;
  font-size: .88rem; font-weight: 600; margin-top: 12px; line-height: 1.6;
}
.rueckmeldung.gut  { background: rgba(6,214,160,.1);  color: #027A50; border: 2px solid rgba(6,214,160,.25); }
.rueckmeldung.warn { background: rgba(255,180,0,.1);  color: #7A5000; border: 2px solid rgba(255,180,0,.3); }
.rueckmeldung.info { background: rgba(229,115,115,.07); color: var(--dunkelrot); border: 2px solid rgba(229,115,115,.2); }
.rueckmeldung ul { padding-left: 18px; margin-top: 6px; }
.rueckmeldung li { margin-bottom: 3px; }
footer { text-align: center; padding: 10px 20px 40px; font-size: .75rem; font-weight: 700; color: rgba(180,60,60,.4); }
@media(max-width:520px) {
  .eingabe-zeile { flex-direction: column; }
  .uebung-raster { grid-template-columns: 1fr 1fr; }
  .karte { padding: 16px 14px; }
}
</style>
</head>
<body>

<a href="index.html" class="zurueck">← Zurück zur Startseite</a>

<header>
  <div class="fach-badge">📕 Deutsch · 5b</div>
  <h1>Satz der Woche</h1>
  <p>Wähle deinen Satz und übe Grammatik und Kreativität!</p>
</header>

<div class="karte">
  <div class="punkte-leiste">
    <div class="punkte-block"><div class="punkte-label">Aufgaben</div><div class="punkte-zahl" id="z-gesamt">0</div></div>
    <div class="punkte-block"><div class="punkte-label">Richtig</div><div class="punkte-zahl gruen" id="z-richtig">0</div></div>
    <div class="punkte-block"><div class="punkte-label">Punkte ⭐</div><div class="punkte-zahl" id="z-punkte">0</div></div>
  </div>

  <div class="quelle-tabs">
    <button class="quelle-tab aktiv" id="tab-eigener" onclick="zeigeQuelle('eigener')">✏️ Eigener Satz</button>
    <button class="quelle-tab"       id="tab-zufall"  onclick="zeigeQuelle('zufall')">🎲 Zufallssatz</button>
  </div>

  <div class="panel sichtbar" id="panel-eigener">
    <label class="feld-label">📝 Dein Satz der Woche</label>
    <div class="eingabe-zeile">
      <input type="text" class="satz-eingabe" id="eigener-satz"
             placeholder="z.B. Der Hund läuft schnell durch den Park."
             onkeydown="if(event.key==='Enter') ladeEigenenSatz()" />
      <button class="btn-rot" onclick="ladeEigenenSatz()">Los geht's!</button>
    </div>
    <div class="hinweis-box" id="hinweis-box"></div>
  </div>

  <div class="panel" id="panel-zufall">
    <label class="feld-label">🎲 Zufällig gewählter Übungssatz</label>
    <div class="zufall-anzeige" id="zufall-anzeige">Klicke auf Neuer Satz!</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn-rahmen" onclick="neuerZufallssatz()">🔄 Neuer Satz</button>
      <button class="btn-rot"    onclick="ladeZufallssatz()">Los geht's!</button>
    </div>
  </div>

  <div class="aktueller-satz" id="aktueller-satz"></div>

  <div class="uebung-bereich" id="uebung-bereich">
    <div class="abschnitt-titel">🎯 Wähle eine Übung</div>
    <div class="kat-leiste">
      <button class="kat-btn aktiv" onclick="filterKat('alle',this)">Alle</button>
      <button class="kat-btn" onclick="filterKat('grammatik',this)">📖 Grammatik</button>
      <button class="kat-btn" onclick="filterKat('kreativ',this)">✨ Kreativ</button>
      <button class="kat-btn" onclick="filterKat('wortschatz',this)">📚 Wortschatz</button>
    </div>
    <div class="uebung-raster">
      <button class="uebung-btn" data-kat="grammatik" data-id="wortarten"   onclick="startUebung(this)"><span class="ue-icon">🔤</span><span><span class="ue-name">Wortarten</span><span class="ue-info">Nomen, Verb, Adjektiv …</span></span></button>
      <button class="uebung-btn" data-kat="grammatik" data-id="zeitformen"  onclick="startUebung(this)"><span class="ue-icon">⏰</span><span><span class="ue-name">Zeitformen</span><span class="ue-info">Präteritum, Perfekt, Futur</span></span></button>
      <button class="uebung-btn" data-kat="grammatik" data-id="satzglieder" onclick="startUebung(this)"><span class="ue-icon">🏷️</span><span><span class="ue-name">Satzglieder</span><span class="ue-info">Subjekt, Prädikat, Objekt</span></span></button>
      <button class="uebung-btn" data-kat="grammatik" data-id="umstellen"   onclick="startUebung(this)"><span class="ue-icon">🔀</span><span><span class="ue-name">Satz umstellen</span><span class="ue-info">Andere Satzgliedfolge</span></span></button>
      <button class="uebung-btn" data-kat="grammatik" data-id="steigerung"  onclick="startUebung(this)"><span class="ue-icon">📈</span><span><span class="ue-name">Steigerung</span><span class="ue-info">Komparativ und Superlativ</span></span></button>
      <button class="uebung-btn" data-kat="grammatik" data-id="plural"      onclick="startUebung(this)"><span class="ue-icon">📚</span><span><span class="ue-name">Plural</span><span class="ue-info">Mehrzahl bilden</span></span></button>
      <button class="uebung-btn" data-kat="grammatik" data-id="kasus"       onclick="startUebung(this)"><span class="ue-icon">🧩</span><span><span class="ue-name">Kasus</span><span class="ue-info">Nominativ, Akkusativ …</span></span></button>
      <button class="uebung-btn" data-kat="grammatik" data-id="verneinung"  onclick="startUebung(this)"><span class="ue-icon">🚫</span><span><span class="ue-name">Verneinung</span><span class="ue-info">Satz verneinen</span></span></button>
      <button class="uebung-btn" data-kat="kreativ"   data-id="erw_wann"    onclick="startUebung(this)"><span class="ue-icon">🕐</span><span><span class="ue-name">Erweitern: Wann?</span><span class="ue-info">Zeitangabe hinzufügen</span></span></button>
      <button class="uebung-btn" data-kat="kreativ"   data-id="erw_wo"      onclick="startUebung(this)"><span class="ue-icon">📍</span><span><span class="ue-name">Erweitern: Wo?</span><span class="ue-info">Ortsangabe hinzufügen</span></span></button>
      <button class="uebung-btn" data-kat="kreativ"   data-id="erw_wie"     onclick="startUebung(this)"><span class="ue-icon">💡</span><span><span class="ue-name">Erweitern: Wie?</span><span class="ue-info">Art und Weise beschreiben</span></span></button>
      <button class="uebung-btn" data-kat="kreativ"   data-id="erw_warum"   onclick="startUebung(this)"><span class="ue-icon">❓</span><span><span class="ue-name">Erweitern: Warum?</span><span class="ue-info">Grund ergänzen</span></span></button>
      <button class="uebung-btn" data-kat="kreativ"   data-id="gegenteil"   onclick="startUebung(this)"><span class="ue-icon">↔️</span><span><span class="ue-name">Gegenteil</span><span class="ue-info">Satz ins Gegenteil umkehren</span></span></button>
      <button class="uebung-btn" data-kat="kreativ"   data-id="bildlich"    onclick="startUebung(this)"><span class="ue-icon">🎨</span><span><span class="ue-name">Bildlich schreiben</span><span class="ue-info">Vergleich oder Metapher</span></span></button>
      <button class="uebung-btn" data-kat="kreativ"   data-id="frage"       onclick="startUebung(this)"><span class="ue-icon">🙋</span><span><span class="ue-name">Frage formulieren</span><span class="ue-info">Satz als Frage umschreiben</span></span></button>
      <button class="uebung-btn" data-kat="kreativ"   data-id="geschichte"  onclick="startUebung(this)"><span class="ue-icon">📖</span><span><span class="ue-name">Mini-Geschichte</span><span class="ue-info">3 Sätze rund um den Satz</span></span></button>
      <button class="uebung-btn" data-kat="wortschatz" data-id="adj_nomen"  onclick="startUebung(this)"><span class="ue-icon">🔁</span><span><span class="ue-name">Adjektiv → Nomen</span><span class="ue-info">z.B. schnell → Schnelligkeit</span></span></button>
      <button class="uebung-btn" data-kat="wortschatz" data-id="verb_nomen" onclick="startUebung(this)"><span class="ue-icon">🔁</span><span><span class="ue-name">Verb → Nomen</span><span class="ue-info">z.B. laufen → das Laufen</span></span></button>
      <button class="uebung-btn" data-kat="wortschatz" data-id="nomen_verb" onclick="startUebung(this)"><span class="ue-icon">🔁</span><span><span class="ue-name">Nomen → Verb</span><span class="ue-info">z.B. der Tanz → tanzen</span></span></button>
      <button class="uebung-btn" data-kat="wortschatz" data-id="synonyme"   onclick="startUebung(this)"><span class="ue-icon">💬</span><span><span class="ue-name">Synonyme finden</span><span class="ue-info">Ähnliche Wörter suchen</span></span></button>
      <button class="uebung-btn" data-kat="wortschatz" data-id="adj_tauschen" onclick="startUebung(this)"><span class="ue-icon">🎭</span><span><span class="ue-name">Adjektive ersetzen</span><span class="ue-info">Treffenderes Adjektiv</span></span></button>
      <button class="uebung-btn" data-kat="wortschatz" data-id="wortfamilie" onclick="startUebung(this)"><span class="ue-icon">🌳</span><span><span class="ue-name">Wortfamilie</span><span class="ue-info">Verwandte Wörter sammeln</span></span></button>
    </div>
  </div>
</div>

<div class="karte" id="aufgabe-karte">
  <div class="aufgabe-innen">
    <div class="aufgabe-typname" id="aufgabe-typname"></div>
    <div class="aufgabe-text"    id="aufgabe-text"></div>
    <div class="tipp-box"        id="tipp-box"></div>
    <div class="mc-optionen"     id="mc-optionen"></div>
    <input   type="text" class="antwort-feld" id="antwort-feld"    style="display:none" onkeydown="if(event.key==='Enter') pruefen()" />
    <textarea            class="antwort-feld" id="antwort-bereich" style="display:none"></textarea>
    <div class="btn-zeile">
      <button class="pruefen-btn" id="pruefen-btn" onclick="pruefen()">✓ Prüfen</button>
      <button class="weiter-btn"  id="weiter-btn"  onclick="naechste()">Nächste Aufgabe →</button>
    </div>
    <div class="rueckmeldung" id="rueckmeldung"></div>
  </div>
</div>

<footer>Klasse 5b 📕</footer>

<script src="deutsch_app.js"></script>
</body>
</html>

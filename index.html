<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meine Lern-Apps – 5b</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #EEF9FF;
    --surface: #FFFFFF;
    --text:    #1A3A4A;
    --muted:   #7AAABB;
    --shadow:  rgba(30,100,140,.12);

    /* Fachfarben */
    --deutsch-light: #FFCDD2;
    --deutsch-mid:   #E57373;
    --deutsch-dark:  #B71C1C;

    --englisch-light: #FFF9C4;
    --englisch-mid:   #F9E04B;
    --englisch-dark:  #F57F17;

    --mathe-light: #BBDEFB;
    --mathe-mid:   #64B5F6;
    --mathe-dark:  #1565C0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Quicksand', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; z-index: -2;
    background: linear-gradient(180deg, #C8EEFF 0%, #A0DEFF 40%, #7DCEF5 100%);
  }
  body::after {
    content: ''; position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(255,255,255,.18) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(255,255,255,.12) 0%, transparent 50%);
  }

  /* ── BUBBLES ── */
  .bubbles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
  .bubble {
    position: absolute; bottom: -60px; border-radius: 50%;
    background: rgba(255,255,255,.25); border: 1.5px solid rgba(255,255,255,.4);
    animation: riseUp linear infinite;
  }
  .bubble:nth-child(1){width:14px;height:14px;left:8%;animation-duration:9s;animation-delay:0s;}
  .bubble:nth-child(2){width:9px;height:9px;left:18%;animation-duration:12s;animation-delay:2s;}
  .bubble:nth-child(3){width:18px;height:18px;left:30%;animation-duration:10s;animation-delay:4s;}
  .bubble:nth-child(4){width:10px;height:10px;left:45%;animation-duration:14s;animation-delay:1s;}
  .bubble:nth-child(5){width:7px;height:7px;left:60%;animation-duration:11s;animation-delay:3s;}
  .bubble:nth-child(6){width:16px;height:16px;left:72%;animation-duration:8s;animation-delay:5s;}
  .bubble:nth-child(7){width:11px;height:11px;left:85%;animation-duration:13s;animation-delay:0.5s;}
  .bubble:nth-child(8){width:8px;height:8px;left:92%;animation-duration:10s;animation-delay:6s;}
  @keyframes riseUp{0%{transform:translateY(0) scale(1);opacity:.7;}100%{transform:translateY(-110vh) scale(1.2);opacity:0;}}

  /* ── HEADER ── */
  header { text-align:center; padding:52px 20px 28px; position:relative; z-index:1; }
  .badge {
    display:inline-flex; align-items:center; gap:6px;
    background:rgba(255,255,255,.7); color:#1A5A7A;
    border-radius:40px; padding:5px 18px;
    font-size:.78rem; font-weight:700; letter-spacing:.6px; text-transform:uppercase;
    margin-bottom:16px; box-shadow:0 4px 12px rgba(30,100,140,.15);
    backdrop-filter:blur(6px);
    animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  h1 {
    font-family:'Baloo 2',cursive; font-size:clamp(2.2rem,7vw,3.8rem);
    font-weight:800; line-height:1.05; color:#fff;
    text-shadow:0 2px 20px rgba(0,80,140,.3);
    animation:popIn .5s .1s cubic-bezier(.34,1.56,.64,1) both;
  }
  .subtitle {
    margin-top:10px; font-size:1rem; color:rgba(255,255,255,.85); font-weight:600;
    animation:popIn .5s .2s cubic-bezier(.34,1.56,.64,1) both;
  }

  /* ── PERKS ── */
  .perks {
    display:flex; flex-wrap:wrap; justify-content:center; gap:12px;
    max-width:700px; margin:0 auto 30px; padding:0 20px;
    position:relative; z-index:1;
    animation:popIn .5s .3s cubic-bezier(.34,1.56,.64,1) both;
  }
  .perk {
    display:flex; align-items:center; gap:7px;
    background:rgba(255,255,255,.65); border-radius:40px; padding:7px 18px;
    font-size:.8rem; font-weight:700; color:#1A5A7A;
    box-shadow:0 3px 10px rgba(30,100,140,.12); backdrop-filter:blur(6px);
  }

  /* REITER -- */
  .tabs-outer {
    max-width:960px; margin:0 auto; padding:0 20px; position:relative; z-index:1;
  }

  .subject-tabs {
    display:flex; flex-wrap:wrap; gap:6px;
    animation:popIn .5s .3s cubic-bezier(.34,1.56,.64,1);
  }
</style>
</head>
<body>
<header>
  <div class="badge">Aktuelles Projekt</div>
  <h1>Meine Lern-Apps</h1>
  <div class="subtitle">Für die Klasse 5b</div>
</header>
<div class="bubbles">
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
</div>
<script>
  // JavaScript for animations and interaction can go here
</script>
</body>
</html>

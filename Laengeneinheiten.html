<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Längeneinheiten – 5b</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Farben und Design basierend auf deiner Index.html */
    :root {
      --bg: #EEF9FF;
      --surface: #FFFFFF;
      --text: #1A3A4A;
      --muted: #7AAABB;
      --shadow: rgba(30,100,140,.12);
      --theme-light: #BBDEFB;
      --theme-mid: #64B5F6;
      --theme-dark: #1565C0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -2;
      background: linear-gradient(180deg, #C8EEFF 0%, #A0DEFF 40%, #7DCEF5 100%);
    }

    header {
      text-align: center;
      padding: 52px 20px 28px;
    }
    h1 {
      font-family: 'Baloo 2', cursive;
      font-size: clamp(2.2rem, 7vw, 3.8rem);
      color: #fff;
      text-shadow: 0 2px 20px rgba(0, 80, 140, .3);
    }
    .subtitle {
      margin-top: 10px;
      font-size: 1rem;
      color: rgba(255, 255, 255, .85);
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }
    button {
      padding: 12px 20px;
      font-size: 1rem;
      font-family: 'Baloo 2', cursive;
      font-weight: 700;
      color: #fff;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background: var(--theme-mid);
      transition: background .2s;
    }
    button:hover {
      background: var(--theme-dark);
    }
    .card {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 6px 16px var(--shadow);
      padding: 20px;
      width: 100%;
      max-width: 600px;
      margin: 20px auto;
    }
    .result {
      margin-top: 10px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }
    .question {
      font-size: 1.2rem;
      font-weight: 700;
    }
    .options {
      margin: 20px 0;
      display: flex;
      flex-direction: column;
    }
    label {
      margin-bottom: 10px;
      cursor: pointer;
    }
    input[type="radio"] {
      display: none;
    }
    input[type="radio"] + span {
      display: inline-block;
      padding: 10px 15px;
      background: rgba(100, 181, 246, 0.3);
      border-radius: 10px;
      transition: background .2s;
    }
    input[type="radio"]:checked + span {
      background: var(--theme-mid);
      color: #fff;
    }

    footer {
      text-align: center;
      padding: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.7);
    }
  </style>
</head>
<body>
  <header>
    <h1>Längeneinheiten</h1>
    <p class="subtitle">Übe das Umrechnen von mm, cm, dm, m, km! 🚀</p>
  </header>

  <div class="buttons">
    <button onclick="generateTask('beginner')">Anfänger</button>
    <button onclick="generateTask('advanced')">Fortgeschritten</button>
  </div>

  <div class="card" id="task-card">
    <p class="question" id="question-text">Klicke auf „Anfänger“ oder „Fortgeschritten“, um zu starten!</p>
    <form id="task-form" onsubmit="checkAnswer(event)">
      <div class="options" id="options"></div>
      <button type="submit">Überprüfen</button>
    </form>
    <p class="result" id="result"></p>
  </div>

  <footer>
    Lernapp für die <strong>5. Klasse</strong> – Mittelschule Bayern
  </footer>

  <script>
    const beginnerTasks = [
      { question: "10 dm = ? m", answers: ["0.1", "1", "10"], correct: "1" },
      { question: "500 mm = ? cm", answers: ["5", "50", "500"], correct: "50" },
      { question: "3 m = ? cm", answers: ["300", "30", "3000"], correct: "300" },
    ];

    const advancedTasks = [
      { question: "1.2 km = ? m", answers: ["120", "1200", "12000"], correct: "1200" },
      { question: "25 dm + 1.5 m = ? cm", answers: ["650", "400", "250"], correct: "650" },
      { question: "5.5 m = ? mm", answers: ["5500", "5550", "550"], correct: "5500" },
    ];

    function generateTask(level) {
      const taskList = level === "beginner" ? beginnerTasks : advancedTasks;
      const task = taskList[Math.floor(Math.random() * taskList.length)];

      const questionElement = document.getElementById("question-text");
      const optionsElement = document.getElementById("options");
      const resultElement = document.getElementById("result");

      questionElement.textContent = task.question;
      optionsElement.innerHTML = task.answers
        .sort(() => 0.5 - Math.random())
        .map(
          (answer, index) => `
          <label>
            <input type="radio" name="option" value="${answer}" />
            <span>${answer}</span>
          </label>
        `
        )
        .join("");
      resultElement.textContent = "";
      optionsElement.setAttribute("data-correct", task.correct);
    }

    function checkAnswer(event) {
      event.preventDefault();
      const form = document.getElementById("task-form");
      const selectedOption = form.option?.value;
      const correctAnswer = document.getElementById("options").dataset.correct;

      const resultElement = document.getElementById("result");
      if (selectedOption === correctAnswer) {
        resultElement.textContent = "✅ Richtig!";
        resultElement.style.color = "green";
      } else {
        resultElement.textContent = `❌ Falsch, die richtige Antwort wäre: ${correctAnswer}.`;
        resultElement.style.color = "red";
      }
    }
  </script>
</body>
</html>

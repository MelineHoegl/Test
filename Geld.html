<!DOCTYPE html>\n<html lang="de">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Geld</title>\n    <script>\n        function berechneAddition() {\n            const betrag1 = parseFloat(document.getElementById('betrag1').value);\n            const betrag2 = parseFloat(document.getElementById('betrag2').value);\n            const summe = betrag1 + betrag2;\n            document.getElementById('ergebnis').innerText = 'Summe: ' + summe + ' €';\n        }\n        function berechneWechselgeld() {\n            const gegeben = parseFloat(document.getElementById('gegeben').value);\n            const kosten = parseFloat(document.getElementById('kosten').value);\n            const wechselgeld = gegeben - kosten;\n            document.getElementById('wechselgeldErgebnis').innerText = 'Wechselgeld: ' + wechselgeld + ' €';\n        }\n    <\/script>\n</head>\n<body>\n    <h1>Geldrechner für 5. Klasse</h1>\n    <h2>1. Addition</h2>\n    <label for="betrag1">Betrag 1 (€):</label>\n    <input type="number" id="betrag1" required>\n    <br>\n    <label for="betrag2">Betrag 2 (€):</label>\n    <input type="number" id="betrag2" required>\n    <br>\n    <button onclick="berechneAddition()">Berechne Summe</button>\n    <p id="ergebnis"></p>\n    <h2>2. Wechselgeld berechnen</h2>\n    <label for="gegeben">Gegeben (€):</label>\n    <input type="number" id="gegeben" required>\n    <br>\n    <label for="kosten">Kosten (€):</label>\n    <input type="number" id="kosten" required>\n    <br>\n    <button onclick="berechneWechselgeld()">Berechne Wechselgeld</button>\n    <p id="wechselgeldErgebnis"></p>\n</body>\n</html>
